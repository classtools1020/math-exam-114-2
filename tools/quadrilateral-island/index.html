<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>四邊形對角線挑戰 ◆</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  :root{
    --bg1:#0d1220; --bg2:#161d38; --card:#1a2342; --card2:#222c52;
    --line:#34406e; --txt:#e9eefb; --muted:#94a0c4;
    --cy:#28dcf0; --cy2:#0fb6cc; --lime:#b6f24a; --gold:#ffd24a;
    --bad:#ff6b81; --good:#5be39a;
  }
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#22305c 0%,var(--bg2) 45%,var(--bg1) 100%);
    color:var(--txt); min-height:100%; display:flex; align-items:center; justify-content:center;
    padding:14px; user-select:none; -webkit-user-select:none;
  }
  .app{ width:100%; max-width:780px; }

  .screen{ display:none; }
  .screen.active{ display:block; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1;} }

  /* 卡片 */
  .card{ background:linear-gradient(180deg,var(--card),#151d39);
    border:1px solid var(--line); border-radius:22px; padding:22px;
    box-shadow:0 20px 50px rgba(0,0,0,.45); }

  /* 開始畫面 */
  .hero{ text-align:center; padding:26px 18px; }
  .badge{ display:inline-block; font-size:14px; letter-spacing:3px; color:var(--cy);
    border:1px solid var(--cy); border-radius:999px; padding:5px 16px; margin-bottom:18px; }
  .title{ font-size:40px; font-weight:900; line-height:1.15; margin-bottom:10px;
    background:linear-gradient(90deg,var(--cy),var(--lime)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .desc{ color:var(--muted); font-size:17px; line-height:1.7; margin-bottom:24px; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:26px; }
  .chip{ background:var(--card2); border:1px solid var(--line); color:#cdd7f5;
    font-size:14px; padding:7px 13px; border-radius:10px; }
  .btn{ font-family:inherit; font-size:22px; font-weight:800; padding:16px 44px; border:none;
    border-radius:14px; cursor:pointer; color:#06121a;
    background:linear-gradient(90deg,var(--cy),var(--lime)); box-shadow:0 8px 22px rgba(40,220,240,.3);
    transition:transform .08s; }
  .btn:active{ transform:translateY(3px); }
  .btn.ghost{ background:transparent; color:var(--cy); border:1px solid var(--cy); box-shadow:none; font-size:18px; padding:12px 28px; }

  /* HUD */
  .hud{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px; }
  .hud .box{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:8px 14px; text-align:center; min-width:84px; }
  .hud .lbl{ font-size:12px; color:var(--muted); letter-spacing:1px; }
  .hud .val{ font-size:22px; font-weight:900; }
  .hud .val.cy{ color:var(--cy); }
  .hud .val.gold{ color:var(--gold); }
  .combo{ color:var(--lime); }
  .bar{ height:8px; background:var(--card2); border-radius:99px; overflow:hidden; margin:4px 0 18px; }
  .bar > i{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--cy),var(--lime)); transition:width .3s; }
  .lvl-tag{ font-size:14px; color:var(--muted); margin-bottom:10px; letter-spacing:1px; }
  .lvl-tag b{ color:var(--cy); }

  /* 題目 */
  .qtext{ font-size:23px; font-weight:800; line-height:1.5; margin-bottom:16px; }
  .qtext .hl{ color:var(--lime); }
  .diagram{ display:flex; justify-content:center; margin-bottom:16px; }
  svg.fig{ width:230px; height:210px; }

  .opts{ display:flex; flex-direction:column; gap:11px; }
  .opt{ font-family:inherit; text-align:left; font-size:19px; font-weight:600; line-height:1.4;
    background:var(--card2); border:1.5px solid var(--line); color:var(--txt);
    padding:16px 18px; border-radius:14px; cursor:pointer; transition:transform .06s,border-color .15s;
    display:flex; align-items:center; gap:12px; }
  .opt .k{ flex:0 0 30px; height:30px; border-radius:8px; background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-weight:900; color:var(--cy); font-size:16px; }
  .opt:active{ transform:scale(.99); }
  .opt.correct{ border-color:var(--good); background:rgba(91,227,154,.14); }
  .opt.correct .k{ background:var(--good); color:#04140b; border-color:var(--good); }
  .opt.wrong{ border-color:var(--bad); background:rgba(255,107,129,.12); }
  .opt.wrong .k{ background:var(--bad); color:#1a0207; border-color:var(--bad); }
  .opt.disabled{ pointer-events:none; opacity:.55; }
  .opt.disabled.correct,.opt.disabled.wrong{ opacity:1; }

  /* 解析 + 下一題 */
  .feedback{ margin-top:16px; border-radius:14px; padding:15px 17px; display:none; }
  .feedback.show{ display:block; animation:fade .2s ease; }
  .feedback.ok{ background:rgba(91,227,154,.12); border:1px solid var(--good); }
  .feedback.ng{ background:rgba(255,107,129,.1); border:1px solid var(--bad); }
  .feedback .head{ font-size:19px; font-weight:900; margin-bottom:6px; }
  .feedback.ok .head{ color:var(--good); }
  .feedback.ng .head{ color:var(--bad); }
  .feedback .exp{ font-size:16px; color:#d4ddf6; line-height:1.6; }
  .next-wrap{ margin-top:14px; text-align:right; display:none; }
  .next-wrap.show{ display:block; }

  .pop{ position:fixed; left:50%; top:30%; transform:translateX(-50%); font-size:34px; font-weight:900;
    color:var(--lime); pointer-events:none; z-index:50; opacity:0; }
  .pop.show{ animation:popup 1s ease forwards; }
  @keyframes popup{ 0%{opacity:0; transform:translate(-50%,10px) scale(.7);} 20%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-40px) scale(1);} }

  /* 結算 */
  .rank-emoji{ font-size:70px; }
  .rank-name{ font-size:34px; font-weight:900; margin:6px 0 4px;
    background:linear-gradient(90deg,var(--gold),var(--lime)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .stat-row{ display:flex; justify-content:center; gap:14px; margin:20px 0; flex-wrap:wrap; }
  .stat{ background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:14px 20px; min-width:120px; }
  .stat .n{ font-size:30px; font-weight:900; color:var(--cy); }
  .stat .t{ font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<div class="app">

  <!-- 開始 -->
  <div id="screen-start" class="screen active">
    <div class="card hero">
      <span class="badge">4-3　特殊四邊形</span>
      <div class="title">四邊形<br>對角線挑戰</div>
      <div class="desc">用對角線的「等長 ・ 平分 ・ 垂直」<br>分辨平行四邊形、長方形、菱形、<br>正方形、箏形、等腰梯形，還要會算！</div>
      <div class="chips">
        <span class="chip">對角線性質</span>
        <span class="chip">判別法</span>
        <span class="chip">面積 ½d₁d₂</span>
        <span class="chip">畢氏定理</span>
        <span class="chip">等腰梯形</span>
      </div>
      <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>
  </div>

  <!-- 遊戲 -->
  <div id="screen-game" class="screen">
    <div class="hud">
      <div class="box"><div class="lbl">分數</div><div class="val cy" id="score">0</div></div>
      <div class="box"><div class="lbl">連對 COMBO</div><div class="val combo" id="combo">0</div></div>
      <div class="box"><div class="lbl">題數</div><div class="val" id="qnum">1/12</div></div>
    </div>
    <div class="bar"><i id="barfill"></i></div>
    <div class="card">
      <div class="lvl-tag" id="lvlTag"></div>
      <div id="figWrap" class="diagram"></div>
      <div class="qtext" id="qtext"></div>
      <div class="opts" id="opts"></div>
      <div class="feedback" id="feedback"><div class="head" id="fbHead"></div><div class="exp" id="fbExp"></div></div>
      <div class="next-wrap" id="nextWrap"><button class="btn ghost" id="nextBtn" onclick="nextQ()">下一題 →</button></div>
    </div>
  </div>

  <!-- 結算 -->
  <div id="screen-end" class="screen">
    <div class="card hero">
      <div class="rank-emoji" id="rankEmoji">🏅</div>
      <div class="rank-name" id="rankName"></div>
      <div class="desc" id="rankMsg" style="margin-bottom:6px"></div>
      <div class="stat-row">
        <div class="stat"><div class="n" id="endScore">0</div><div class="t">總分</div></div>
        <div class="stat"><div class="n" id="endAcc">0%</div><div class="t">答對率</div></div>
        <div class="stat"><div class="n" id="endMax">0</div><div class="t">最高連對</div></div>
      </div>
      <button class="btn" onclick="startGame()">再挑戰一次</button>
    </div>
  </div>

</div>
<div class="pop" id="pop"></div>

<script>
/* ============ 圖形（含對角線繪製）============ */
// 頂點依序環繞，對角線 = v0-v2、v1-v3
const SHAPES = {
  para:    {name:"平行四邊形", v:[[40,150],[85,60],[195,60],[150,150]]},
  rect:    {name:"長方形",     v:[[35,60],[195,60],[195,150],[35,150]]},
  rhombus: {name:"菱形",       v:[[115,30],[185,105],[115,180],[45,105]]},
  square:  {name:"正方形",     v:[[60,45],[170,45],[170,155],[60,155]]},
  kite:    {name:"箏形",       v:[[115,28],[175,100],[115,185],[55,100]]},
  isotrap: {name:"等腰梯形",   v:[[75,55],[155,55],[200,155],[30,155]]},
};
function fig(key,{diag=true}={}){
  const s=SHAPES[key]; const v=s.v;
  const poly=v.map(p=>p.join(",")).join(" ");
  let d="";
  if(diag){
    const cx=(v[0][0]+v[2][0])/2, cy=(v[0][1]+v[2][1])/2;       // 交點(任取一對角線中點示意)
    d=`<line x1="${v[0][0]}" y1="${v[0][1]}" x2="${v[2][0]}" y2="${v[2][1]}" stroke="#28dcf0" stroke-width="2.5" stroke-dasharray="6 5"/>
       <line x1="${v[1][0]}" y1="${v[1][1]}" x2="${v[3][0]}" y2="${v[3][1]}" stroke="#b6f24a" stroke-width="2.5" stroke-dasharray="6 5"/>
       <circle cx="${cx}" cy="${cy}" r="4" fill="#fff"/>`;
  }
  const dots=v.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4.5" fill="#e9eefb"/>`).join("");
  return `<svg class="fig" viewBox="0 0 230 210">
    <polygon points="${poly}" fill="rgba(40,220,240,.10)" stroke="#e9eefb" stroke-width="3.5" stroke-linejoin="round"/>
    ${d}${dots}</svg>`;
}

/* ============ 對角線性質參考 ============
  等長 / 互相平分 / 互相垂直
  平行四邊形：✗ ✓ ✗
  長方形　　：✓ ✓ ✗
  菱形　　　：✗ ✓ ✓
  正方形　　：✓ ✓ ✓
  箏形　　　：✗ ✗(一條平分另一條) ✓
  等腰梯形　：✓ ✗ ✗
=================================== */
const PROP = {
  para:   "兩條對角線互相平分，但不等長也不垂直",
  rect:   "兩條對角線等長且互相平分，但不垂直",
  rhombus:"兩條對角線互相垂直平分，但不等長",
  square: "兩條對角線等長、互相垂直、又互相平分",
  kite:   "一條對角線垂直平分另一條對角線",
  isotrap:"兩條對角線等長，但不互相平分",
};

/* ============ 題庫 ============ */
// 第1關：性質判斷（看圖選對角線性質 / 判別法）
const L1 = [
  ()=>({fig:"rhombus", q:"圖中<span class='hl'>菱形</span>的兩條對角線，有什麼性質？", opts:shuffleOpts([
      [PROP.rhombus,true],[PROP.rect,false],[PROP.para,false],[PROP.square,false]]),
      exp:"菱形四邊等長，兩條對角線『互相垂直平分』，但不一定等長。"}),
  ()=>({fig:"rect", q:"圖中<span class='hl'>長方形</span>的兩條對角線，有什麼性質？", opts:shuffleOpts([
      [PROP.rect,true],[PROP.rhombus,false],[PROP.square,false],[PROP.isotrap,false]]),
      exp:"長方形四個角都是直角，兩條對角線『等長且互相平分』，但不垂直。"}),
  ()=>({fig:"square", q:"圖中<span class='hl'>正方形</span>的兩條對角線，有什麼性質？", opts:shuffleOpts([
      [PROP.square,true],[PROP.rect,false],[PROP.rhombus,false],[PROP.para,false]]),
      exp:"正方形既是長方形又是菱形，對角線『等長、互相垂直、又互相平分』。"}),
  ()=>({fig:"isotrap", q:"圖中<span class='hl'>等腰梯形</span>的兩條對角線，有什麼性質？", opts:shuffleOpts([
      [PROP.isotrap,true],[PROP.rect,false],[PROP.para,false],[PROP.kite,false]]),
      exp:"等腰梯形兩腰等長，兩條對角線『等長』，但不會互相平分。"}),
  ()=>({fig:"kite", q:"圖中<span class='hl'>箏形</span>的對角線，有什麼性質？", opts:shuffleOpts([
      [PROP.kite,true],[PROP.rhombus,false],[PROP.square,false],[PROP.rect,false]]),
      exp:"箏形兩組鄰邊等長，『一條對角線垂直平分另一條』（但不互相平分）。"}),
];

// 第2關：判別法（給對角線條件 → 是哪種四邊形）+ 包含關係
const L2 = [
  ()=>({fig:null, q:"一個四邊形的<span class='hl'>對角線互相垂直平分</span>，但不一定等長，它是？", opts:shuffleOpts([
      ["菱形",true],["長方形",false],["等腰梯形",false],["箏形",false]]),
      exp:"兩條對角線互相垂直平分 → 菱形（判別法）。"}),
  ()=>({fig:null, q:"一個四邊形的<span class='hl'>對角線等長且互相平分</span>，它是？", opts:shuffleOpts([
      ["長方形",true],["菱形",false],["箏形",false],["平行四邊形",false]]),
      exp:"兩條對角線等長且互相平分 → 長方形（判別法）。"}),
  ()=>({fig:null, q:"一個四邊形的<span class='hl'>對角線等長、又互相垂直平分</span>，它是？", opts:shuffleOpts([
      ["正方形",true],["長方形",false],["菱形",false],["等腰梯形",false]]),
      exp:"等長＋互相垂直平分，三個條件都滿足 → 正方形。"}),
  ()=>({fig:null, q:"<span class='hl'>一條對角線垂直平分另一條</span>對角線的四邊形是？", opts:shuffleOpts([
      ["箏形",true],["菱形",false],["梯形",false],["長方形",false]]),
      exp:"只有一條對角線垂直平分另一條 → 箏形（菱形是『兩條互相』垂直平分）。"}),
  ()=>({fig:null, q:"下列敘述哪一個<span class='hl'>正確</span>？", opts:shuffleOpts([
      ["正方形一定是長方形，也一定是菱形",true],
      ["長方形一定是正方形",false],
      ["菱形一定是長方形",false],
      ["梯形是平行四邊形的一種",false]]),
      exp:"正方形同時符合長方形（四直角）與菱形（四邊等長）的定義，所以兩者都是。"}),
  ()=>({fig:null, q:"下列敘述哪一個<span class='hl'>錯誤</span>？", opts:shuffleOpts([
      ["菱形的對角線一定等長",true],
      ["菱形一定是平行四邊形",false],
      ["長方形的對角線一定等長",false],
      ["正方形的對角線互相垂直",false]]),
      exp:"菱形對角線互相垂直平分，但『不一定等長』（等長的菱形就變正方形了）。"}),
];

// 第3關：計算挑戰
function calcArea(){
  const pairs=[[6,8],[8,10],[10,12],[12,16],[6,12],[9,12]];
  const [a,b]=pairs[Math.floor(Math.random()*pairs.length)];
  const ans=a*b/2;
  const shape=Math.random()<.5?"菱形":"箏形";
  return {fig:shape==="菱形"?"rhombus":"kite",
    q:`一個<span class='hl'>${shape}</span>的兩條對角線長分別是 <span class='hl'>${a}</span> 和 <span class='hl'>${b}</span>，面積是多少？`,
    opts:shuffleOpts([[ans+"",true],[(a*b)+"",false],[(a+b)+"",false],[(ans+a)+"",false]]),
    exp:`對角線互相垂直的四邊形，面積 = ½ × d₁ × d₂ = ½ × ${a} × ${b} = ${ans}。`};
}
function calcPyth(){
  const t=[[3,4,5],[6,8,10],[5,12,13],[8,15,17],[9,12,15]];
  const [a,b,c]=t[Math.floor(Math.random()*t.length)];
  return {fig:"rect",
    q:`一個<span class='hl'>長方形</span>長 <span class='hl'>${b}</span>、寬 <span class='hl'>${a}</span>，它的對角線長是多少？`,
    opts:shuffleOpts([[c+"",true],[(a+b)+"",false],[(b-a)+"",false],[(a*b)+"",false]]),
    exp:`長方形對角線 = √(長²+寬²) = √(${b}²+${a}²) = √${b*b+a*a} = ${c}（畢氏定理）。`};
}
function calcIso(){
  const ang=[50,55,62,68,72,75][Math.floor(Math.random()*6)];
  return {fig:"isotrap",
    q:`<span class='hl'>等腰梯形</span> ABCD 中 AB∥CD，若一個下底角 ∠A = <span class='hl'>${ang}°</span>，<br>則同一條底邊上的另一個底角 ∠B = ？`,
    opts:shuffleOpts([[ang+"°",true],[(180-ang)+"°",false],[(90-ang)+"°",false],[(ang+10)+"°",false]]),
    exp:`等腰梯形『同一底邊上的兩個底角相等』，所以 ∠B = ∠A = ${ang}°。`};
}
const L3 = [calcArea, calcPyth, calcIso, calcArea, calcPyth];

const LEVELS = [
  {name:"性質判斷", gen:L1, n:4},
  {name:"判別法 & 觀念", gen:L2, n:4},
  {name:"計算挑戰", gen:L3, n:4},
];

/* ============ 流程 ============ */
let score=0, combo=0, maxCombo=0, correctCnt=0, totalQ=0;
let level=0, qInLevel=0, queue=[], answered=false;

function startGame(){
  score=0; combo=0; maxCombo=0; correctCnt=0; level=0; qInLevel=0;
  totalQ=LEVELS.reduce((s,l)=>s+l.n,0);
  show("screen-game");
  buildQueue();
  render();
}
function buildQueue(){
  // 從本關產生器隨機取 n 題（不重複用洗牌）
  const pool=shuffle([...LEVELS[level].gen]);
  queue=[];
  for(let i=0;i<LEVELS[level].n;i++){ queue.push(pool[i % pool.length]()); }
  qInLevel=0;
}
function curIndex(){ return LEVELS.slice(0,level).reduce((s,l)=>s+l.n,0)+qInLevel; }

function render(){
  answered=false;
  const q=queue[qInLevel];
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("qnum").textContent=(curIndex()+1)+"/"+totalQ;
  document.getElementById("barfill").style.width=((curIndex())/totalQ*100)+"%";
  document.getElementById("lvlTag").innerHTML=`第 <b>${level+1}</b> 關　${LEVELS[level].name}`;
  document.getElementById("figWrap").innerHTML = q.fig ? fig(q.fig,{diag:level<2?true:true}) : "";
  document.getElementById("figWrap").style.display = q.fig ? "flex" : "none";
  document.getElementById("qtext").innerHTML=q.q;
  const ks=["A","B","C","D"];
  const o=document.getElementById("opts"); o.innerHTML="";
  q.opts.forEach((op,i)=>{
    const b=document.createElement("button"); b.className="opt";
    b.innerHTML=`<span class="k">${ks[i]}</span><span>${op.t}</span>`;
    b.onclick=()=>choose(b,op,q);
    o.appendChild(b);
  });
  document.getElementById("feedback").className="feedback";
  document.getElementById("nextWrap").className="next-wrap";
}

function choose(btn,op,q){
  if(answered) return; answered=true;
  document.querySelectorAll(".opt").forEach(b=>b.classList.add("disabled"));
  const fb=document.getElementById("feedback");
  if(op.correct){
    btn.classList.add("correct");
    combo++; maxCombo=Math.max(maxCombo,combo); correctCnt++;
    const gain=100+(combo-1)*20;
    score+=gain;
    popup("+"+gain+(combo>1?"　COMBO ×"+combo:""));
    fb.className="feedback ok show";
    document.getElementById("fbHead").textContent="正確！";
  }else{
    btn.classList.add("wrong");
    combo=0;
    document.querySelectorAll(".opt").forEach(b=>{
      if(b.querySelector("span:last-child").textContent===correctText(q)) b.classList.add("correct");
    });
    fb.className="feedback ng show";
    document.getElementById("fbHead").textContent="再看一次解析";
  }
  document.getElementById("fbExp").innerHTML=q.exp;
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("nextWrap").className="next-wrap show";
}
function correctText(q){ return q.opts.find(o=>o.correct).t; }

function nextQ(){
  qInLevel++;
  if(qInLevel>=LEVELS[level].n){
    level++;
    if(level>=LEVELS.length){ return endGame(); }
    buildQueue();
  }
  render();
}

function endGame(){
  show("screen-end");
  const acc=Math.round(correctCnt/totalQ*100);
  document.getElementById("endScore").textContent=score;
  document.getElementById("endAcc").textContent=acc+"%";
  document.getElementById("endMax").textContent=maxCombo;
  let emoji,name,msg;
  if(acc===100){ emoji="💎"; name="鑽石級・四邊形大師"; msg="全對！對角線性質與計算完全掌握！"; }
  else if(acc>=75){ emoji="🥇"; name="黃金級・四邊形達人"; msg="很強！再把錯的幾題的解析看一次就滿分了。"; }
  else if(acc>=50){ emoji="🥈"; name="白銀級・穩定進步"; msg="不錯！多注意『對角線等長 vs 垂直』的差別。"; }
  else{ emoji="🥉"; name="青銅級・繼續加油"; msg="先記熟對角線性質表，再挑戰一次會更好！"; }
  document.getElementById("rankEmoji").textContent=emoji;
  document.getElementById("rankName").textContent=name;
  document.getElementById("rankMsg").textContent=msg;
}

/* ============ 小工具 ============ */
function shuffleOpts(arr){ return shuffle(arr).map(([t,correct])=>({t,correct})); }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); window.scrollTo(0,0); }
function popup(txt){ const p=document.getElementById("pop"); p.textContent=txt; p.classList.remove("show"); void p.offsetWidth; p.classList.add("show"); }
</script>
