<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>四邊形尋寶海戰 ⚓</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  :root{
    --bg1:#0a1326; --bg2:#10204a; --card:#15203f; --tile:#1d2c52; --tile2:#27406f;
    --line:#33508c; --txt:#eaf1ff; --muted:#8ea2cc;
    --cy:#2fe0f0; --lime:#bff24a; --gold:#ffd24a; --bad:#ff6b81; --good:#5be39a;
  }
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:radial-gradient(1000px 500px at 50% -5%,#1b3a78 0%,var(--bg2) 45%,var(--bg1) 100%);
    color:var(--txt); min-height:100%; display:flex; align-items:center; justify-content:center;
    padding:12px; user-select:none; -webkit-user-select:none; overflow-x:hidden;
  }
  .app{ width:100%; max-width:560px; }
  .screen{ display:none; } .screen.active{ display:block; animation:fade .25s; }
  @keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1;} }
  .card{ background:linear-gradient(180deg,var(--card),#101a35); border:1px solid var(--line);
    border-radius:22px; padding:20px; box-shadow:0 18px 44px rgba(0,0,0,.5); }

  /* 開始 */
  .hero{ text-align:center; padding:24px 16px; }
  .wave{ font-size:64px; }
  .title{ font-size:38px; font-weight:900; margin:4px 0 8px;
    background:linear-gradient(90deg,var(--cy),var(--lime)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .desc{ color:var(--muted); font-size:16px; line-height:1.7; margin-bottom:18px; }
  .legend{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:22px; font-size:15px; color:#cdd9f5;}
  .legend span{ background:var(--tile); border:1px solid var(--line); padding:6px 12px; border-radius:10px;}
  .btn{ font-family:inherit; font-size:22px; font-weight:800; padding:15px 42px; border:none; border-radius:14px;
    cursor:pointer; color:#06121a; background:linear-gradient(90deg,var(--cy),var(--lime));
    box-shadow:0 7px 20px rgba(47,224,240,.32); transition:transform .08s; }
  .btn:active{ transform:translateY(3px); }
  .btn.ghost{ background:transparent; color:var(--cy); border:1px solid var(--cy); box-shadow:none; font-size:17px; padding:11px 26px;}

  /* HUD */
  .hud{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:12px; }
  .hud .box{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:7px 12px; text-align:center; flex:1;}
  .hud .lbl{ font-size:11px; color:var(--muted); letter-spacing:1px; }
  .hud .val{ font-size:20px; font-weight:900; }
  .hp{ color:var(--bad); letter-spacing:1px; }
  .sc{ color:var(--cy); } .cb{ color:var(--lime); }

  /* 棋盤 */
  .board{ display:grid; grid-template-columns:repeat(6,1fr); gap:7px; }
  .cell{ aspect-ratio:1; border-radius:12px; background:linear-gradient(180deg,var(--tile),#15243f);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:30px; cursor:pointer; transition:transform .08s, background .2s; position:relative; }
  .cell .wv{ font-size:18px; color:#41618f; }
  .cell:active{ transform:scale(.93); }
  .cell.hidden:hover{ background:var(--tile2); }
  .cell.done{ cursor:default; }
  .cell.r-water{ background:#13325e; }
  .cell.r-bomb{ background:rgba(255,107,129,.22); border-color:var(--bad); }
  .cell.r-star{ background:rgba(91,227,154,.22); border-color:var(--good); }
  .cell.r-ship{ background:rgba(255,210,74,.25); border-color:var(--gold); }
  .reveal{ animation:flip .35s ease; }
  @keyframes flip{ 0%{transform:rotateY(90deg) scale(.7);} 100%{transform:rotateY(0) scale(1);} }
  .hint{ text-align:center; color:var(--muted); font-size:14px; margin-top:12px; }

  /* 題目彈窗 */
  .modal{ position:fixed; inset:0; background:rgba(5,10,22,.78); display:none; align-items:center; justify-content:center; padding:14px; z-index:40;}
  .modal.show{ display:flex; animation:fade .2s; }
  .qbox{ width:100%; max-width:520px; background:linear-gradient(180deg,var(--card),#101a35);
    border:1px solid var(--line); border-radius:20px; padding:20px; box-shadow:0 20px 50px rgba(0,0,0,.6); }
  .qtop{ font-size:13px; color:var(--gold); letter-spacing:1px; margin-bottom:8px; }
  .diagram{ display:flex; justify-content:center; margin:4px 0 12px; }
  svg.fig{ width:170px; height:160px; }
  .qtext{ font-size:21px; font-weight:800; line-height:1.5; margin-bottom:14px; }
  .qtext .hl{ color:var(--lime); }
  .opts{ display:flex; flex-direction:column; gap:9px; }
  .opt{ font-family:inherit; text-align:left; font-size:18px; font-weight:600; line-height:1.4;
    background:var(--tile); border:1.5px solid var(--line); color:var(--txt); padding:14px 16px;
    border-radius:13px; cursor:pointer; display:flex; gap:10px; align-items:center; transition:transform .06s; }
  .opt .k{ flex:0 0 26px; height:26px; border-radius:7px; background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-weight:900; color:var(--cy); font-size:14px; }
  .opt:active{ transform:scale(.99); }
  .opt.correct{ border-color:var(--good); background:rgba(91,227,154,.16);} .opt.correct .k{ background:var(--good); color:#04140b;}
  .opt.wrong{ border-color:var(--bad); background:rgba(255,107,129,.14);} .opt.wrong .k{ background:var(--bad); color:#1a0207;}
  .opt.dis{ pointer-events:none; opacity:.55; } .opt.dis.correct,.opt.dis.wrong{ opacity:1; }
  .fb{ margin-top:14px; border-radius:13px; padding:13px 15px; display:none; font-size:15px; line-height:1.6; }
  .fb.show{ display:block; } .fb.ok{ background:rgba(91,227,154,.12); border:1px solid var(--good);} .fb.ng{ background:rgba(255,107,129,.1); border:1px solid var(--bad);}
  .fb b{ display:block; font-size:18px; margin-bottom:4px; } .fb.ok b{ color:var(--good);} .fb.ng b{ color:var(--bad);}
  .fb .res{ color:var(--gold); font-weight:800; margin-top:6px; }
  .mnext{ margin-top:12px; text-align:right; display:none; } .mnext.show{ display:block; }

  /* 特效 */
  .shake{ animation:shake .4s; } @keyframes shake{ 0%,100%{transform:none;} 20%{transform:translateX(-9px);} 40%{transform:translateX(9px);} 60%{transform:translateX(-6px);} 80%{transform:translateX(6px);} }
  .flash{ position:fixed; inset:0; pointer-events:none; z-index:60; opacity:0; }
  .flash.red{ background:radial-gradient(circle,rgba(255,80,100,.5),transparent 70%); }
  .flash.go{ animation:fl .5s; } @keyframes fl{ 0%{opacity:0;} 30%{opacity:1;} 100%{opacity:0;} }
  .fx{ position:fixed; top:-30px; font-size:26px; pointer-events:none; z-index:55; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(360deg); opacity:.2;} }

  /* 結算 */
  .endbig{ font-size:64px; } .endt{ font-size:34px; font-weight:900; margin:6px 0;
    background:linear-gradient(90deg,var(--gold),var(--lime)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .stat-row{ display:flex; justify-content:center; gap:12px; margin:16px 0; flex-wrap:wrap; }
  .stat{ background:var(--tile); border:1px solid var(--line); border-radius:12px; padding:12px 18px; }
  .stat .n{ font-size:26px; font-weight:900; color:var(--cy);} .stat .t{ font-size:12px; color:var(--muted);}
</style>
</head>
<body>
<div class="app">
  <!-- 開始 -->
  <div id="s-start" class="screen active">
    <div class="card hero">
      <div class="wave">⚓🌊</div>
      <div class="title">四邊形尋寶海戰</div>
      <div class="desc">海域裡藏著敵人的艦隊。<br>點一格 → 答一題 4-3 的數學 → 答對才能開！<br><b style="color:#fff">找到並擊沉敵艦 🚢 就獲勝！</b></div>
      <div class="legend">
        <span>🚢 敵艦＝贏</span><span>💣 地雷 −2</span><span>⭐ 救命星 +2</span>
      </div>
      <button class="btn" onclick="startGame()">出航 ▶</button>
    </div>
  </div>

  <!-- 遊戲 -->
  <div id="s-game" class="screen">
    <div class="hud">
      <div class="box"><div class="lbl">生命</div><div class="val hp" id="hp">❤❤❤❤❤❤</div></div>
      <div class="box"><div class="lbl">分數</div><div class="val sc" id="score">0</div></div>
      <div class="box"><div class="lbl">連對</div><div class="val cb" id="combo">0</div></div>
    </div>
    <div class="card">
      <div class="board" id="board"></div>
      <div class="hint">點任一格海域開始攻擊，答對才能翻開 🔍</div>
    </div>
  </div>

  <!-- 結算 -->
  <div id="s-end" class="screen">
    <div class="card hero">
      <div class="endbig" id="endIcon">🏆</div>
      <div class="endt" id="endTitle"></div>
      <div class="desc" id="endMsg"></div>
      <div class="stat-row">
        <div class="stat"><div class="n" id="eScore">0</div><div class="t">分數</div></div>
        <div class="stat"><div class="n" id="eOpen">0</div><div class="t">翻開格數</div></div>
        <div class="stat"><div class="n" id="eMax">0</div><div class="t">最高連對</div></div>
      </div>
      <button class="btn" onclick="startGame()">再戰一場 🔁</button>
    </div>
  </div>
</div>

<!-- 題目彈窗 -->
<div class="modal" id="modal"><div class="qbox">
  <div class="qtop" id="qtop"></div>
  <div class="diagram" id="figWrap"></div>
  <div class="qtext" id="qtext"></div>
  <div class="opts" id="opts"></div>
  <div class="fb" id="fb"></div>
  <div class="mnext" id="mnext"><button class="btn ghost" id="mnextBtn">繼續 →</button></div>
</div></div>

<div class="flash red" id="flash"></div>

<script>
/* ===== 圖形（含對角線）===== */
const SHAPES={
  para:{name:"平行四邊形",v:[[30,120],[68,50],[160,50],[122,120]]},
  rect:{name:"長方形",v:[[28,52],[162,52],[162,118],[28,118]]},
  rhombus:{name:"菱形",v:[[95,28],[160,85],[95,142],[30,85]]},
  square:{name:"正方形",v:[[48,40],[142,40],[142,134],[48,134]]},
  kite:{name:"箏形",v:[[95,24],[150,82],[95,150],[40,82]]},
  isotrap:{name:"等腰梯形",v:[[62,48],[128,48],[166,126],[24,126]]},
};
function fig(key){ const s=SHAPES[key],v=s.v; if(!s) return "";
  const poly=v.map(p=>p.join(",")).join(" ");
  const cx=(v[0][0]+v[2][0])/2,cy=(v[0][1]+v[2][1])/2;
  return `<svg class="fig" viewBox="0 0 190 170">
   <polygon points="${poly}" fill="rgba(47,224,240,.10)" stroke="#eaf1ff" stroke-width="3" stroke-linejoin="round"/>
   <line x1="${v[0][0]}" y1="${v[0][1]}" x2="${v[2][0]}" y2="${v[2][1]}" stroke="#2fe0f0" stroke-width="2.2" stroke-dasharray="5 4"/>
   <line x1="${v[1][0]}" y1="${v[1][1]}" x2="${v[3][0]}" y2="${v[3][1]}" stroke="#bff24a" stroke-width="2.2" stroke-dasharray="5 4"/>
   <circle cx="${cx}" cy="${cy}" r="3.5" fill="#fff"/>
   ${v.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#eaf1ff"/>`).join("")}</svg>`;
}
const PROP={
  para:"兩條對角線互相平分，但不等長也不垂直",
  rect:"兩條對角線等長且互相平分，但不垂直",
  rhombus:"兩條對角線互相垂直平分，但不等長",
  square:"兩條對角線等長、互相垂直、又互相平分",
  kite:"一條對角線垂直平分另一條對角線",
  isotrap:"兩條對角線等長，但不互相平分",
};
/* ===== 題庫（對齊課本4-3）===== */
const L1=[
 ()=>({fig:"rhombus",q:"圖中<span class='hl'>菱形</span>的兩條對角線有什麼性質？",opts:[[PROP.rhombus,1],[PROP.rect,0],[PROP.para,0],[PROP.square,0]],exp:"菱形四邊等長，對角線『互相垂直平分』，但不一定等長。"}),
 ()=>({fig:"rect",q:"圖中<span class='hl'>長方形</span>的兩條對角線有什麼性質？",opts:[[PROP.rect,1],[PROP.rhombus,0],[PROP.square,0],[PROP.isotrap,0]],exp:"長方形四個直角，對角線『等長且互相平分』，但不垂直。"}),
 ()=>({fig:"square",q:"圖中<span class='hl'>正方形</span>的兩條對角線有什麼性質？",opts:[[PROP.square,1],[PROP.rect,0],[PROP.rhombus,0],[PROP.para,0]],exp:"正方形既是長方形又是菱形，對角線『等長、互相垂直、又互相平分』。"}),
 ()=>({fig:"isotrap",q:"圖中<span class='hl'>等腰梯形</span>的兩條對角線有什麼性質？",opts:[[PROP.isotrap,1],[PROP.rect,0],[PROP.para,0],[PROP.kite,0]],exp:"等腰梯形兩腰等長，對角線『等長』，但不互相平分。"}),
 ()=>({fig:"kite",q:"圖中<span class='hl'>箏形</span>的對角線有什麼性質？",opts:[[PROP.kite,1],[PROP.rhombus,0],[PROP.square,0],[PROP.rect,0]],exp:"箏形兩組鄰邊等長，『一條對角線垂直平分另一條』。"}),
];
const L2=[
 ()=>({fig:null,q:"對角線<span class='hl'>互相垂直平分</span>但不一定等長，是？",opts:[["菱形",1],["長方形",0],["等腰梯形",0],["箏形",0]],exp:"互相垂直平分 → 菱形。"}),
 ()=>({fig:null,q:"對角線<span class='hl'>等長且互相平分</span>，是？",opts:[["長方形",1],["菱形",0],["箏形",0],["平行四邊形",0]],exp:"等長且互相平分 → 長方形。"}),
 ()=>({fig:null,q:"對角線<span class='hl'>等長、又互相垂直平分</span>，是？",opts:[["正方形",1],["長方形",0],["菱形",0],["等腰梯形",0]],exp:"三個條件都滿足 → 正方形。"}),
 ()=>({fig:null,q:"<span class='hl'>一條對角線垂直平分另一條</span>的四邊形是？",opts:[["箏形",1],["菱形",0],["梯形",0],["長方形",0]],exp:"只有一條垂直平分另一條 → 箏形。"}),
 ()=>({fig:null,q:"下列哪一個<span class='hl'>正確</span>？",opts:[["正方形一定是長方形，也是菱形",1],["長方形一定是正方形",0],["菱形一定是長方形",0],["梯形是平行四邊形",0]],exp:"正方形同時符合長方形與菱形的定義。"}),
 ()=>({fig:null,q:"下列哪一個<span class='hl'>錯誤</span>？",opts:[["菱形的對角線一定等長",1],["菱形一定是平行四邊形",0],["長方形的對角線一定等長",0],["正方形的對角線互相垂直",0]],exp:"菱形對角線互相垂直平分，但不一定等長。"}),
];
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function calcArea(){const p=rnd([[6,8],[8,10],[10,12],[12,16],[6,12],[9,12]]);const ans=p[0]*p[1]/2;const sh=Math.random()<.5?["菱形","rhombus"]:["箏形","kite"];
 return{fig:sh[1],q:`一個<span class='hl'>${sh[0]}</span>兩條對角線長 <span class='hl'>${p[0]}</span> 和 <span class='hl'>${p[1]}</span>，面積是？`,
 opts:[[ans+"",1],[(p[0]*p[1])+"",0],[(p[0]+p[1])+"",0],[(ans+p[0])+"",0]],exp:`對角線垂直 → 面積=½×${p[0]}×${p[1]}=${ans}。`};}
function calcPyth(){const t=rnd([[3,4,5],[6,8,10],[5,12,13],[8,15,17],[9,12,15]]);
 return{fig:"rect",q:`<span class='hl'>長方形</span>長 <span class='hl'>${t[1]}</span>、寬 <span class='hl'>${t[0]}</span>，對角線長是？`,
 opts:[[t[2]+"",1],[(t[0]+t[1])+"",0],[(t[1]-t[0])+"",0],[(t[0]*t[1])+"",0]],exp:`對角線=√(${t[1]}²+${t[0]}²)=${t[2]}（畢氏定理）。`};}
function calcIso(){const a=rnd([50,55,62,68,72,75]);
 return{fig:"isotrap",q:`<span class='hl'>等腰梯形</span> AB∥CD，下底角 ∠A=<span class='hl'>${a}°</span>，同一底的 ∠B=？`,
 opts:[[a+"°",1],[(180-a)+"°",0],[(90-a)+"°",0],[(a+10)+"°",0]],exp:`等腰梯形同一底的兩底角相等，∠B=${a}°。`};}
const POOL=[...L1,...L1,...L2,...L2,calcArea,calcPyth,calcIso];
function getQ(){const q=rnd(POOL)();q.opts=shuffle(q.opts.map(([t,c])=>({t,c:!!c})));return q;}

/* ===== 棋盤 ===== */
const N=36, COLS=6;
let board=[], hp=6, score=0, combo=0, maxCombo=0, opened=0, busy=false, over=false;
const PLAN={ship:1, bomb:4, star:4}; // 其餘為海水

function startGame(){
  board=Array(N).fill("water");
  let cells=shuffle([...Array(N).keys()]); let i=0;
  for(let k=0;k<PLAN.ship;k++) board[cells[i++]]="ship";
  for(let k=0;k<PLAN.bomb;k++) board[cells[i++]]="bomb";
  for(let k=0;k<PLAN.star;k++) board[cells[i++]]="star";
  hp=6; score=0; combo=0; maxCombo=0; opened=0; over=false; busy=false;
  revealed=Array(N).fill(false);
  show("s-game"); renderHUD(); renderBoard();
}
let revealed=[];
function renderHUD(){
  document.getElementById("hp").textContent="❤".repeat(Math.max(0,hp))||"💀";
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
}
function renderBoard(){
  const b=document.getElementById("board"); b.innerHTML="";
  for(let i=0;i<N;i++){
    const c=document.createElement("div");
    if(revealed[i]){
      const t=board[i];
      c.className="cell done r-"+t;
      c.textContent = t==="ship"?"🚢":t==="bomb"?"💣":t==="star"?"⭐":"🌊";
    }else{
      c.className="cell hidden"; c.innerHTML='<span class="wv">🌊</span>';
      c.onclick=()=>attack(i,c);
    }
    b.appendChild(c);
  }
}

/* ===== 攻擊 → 出題 ===== */
let curCell=null, curIdx=-1, curQ=null;
function attack(i,c){
  if(busy||over||revealed[i]) return;
  curIdx=i; curCell=c; curQ=getQ(); openModal(curQ);
}
function openModal(q){
  document.getElementById("qtop").textContent="🎯 答對才能翻開這格！";
  const fw=document.getElementById("figWrap");
  fw.innerHTML=q.fig?fig(q.fig):""; fw.style.display=q.fig?"flex":"none";
  document.getElementById("qtext").innerHTML=q.q;
  const ks=["A","B","C","D"], o=document.getElementById("opts"); o.innerHTML="";
  q.opts.forEach((op,idx)=>{
    const btn=document.createElement("button"); btn.className="opt";
    btn.innerHTML=`<span class="k">${ks[idx]}</span><span>${op.t}</span>`;
    btn.onclick=()=>answer(btn,op,q); o.appendChild(btn);
  });
  document.getElementById("fb").className="fb"; document.getElementById("mnext").className="mnext";
  document.getElementById("modal").classList.add("show");
}
function answer(btn,op,q){
  if(busy) return; busy=true;
  document.querySelectorAll(".opt").forEach(b=>b.classList.add("dis"));
  const fb=document.getElementById("fb");
  if(op.c){
    btn.classList.add("correct"); combo++; maxCombo=Math.max(maxCombo,combo);
    fb.className="fb ok show"; fb.innerHTML="<b>答對！攻擊命中 🎯</b>"+q.exp;
    document.getElementById("mnextBtn").textContent="開盒子 📦";
    document.getElementById("mnextBtn").onclick=()=>{ closeModal(); doReveal(curIdx); };
  }else{
    btn.classList.add("wrong"); combo=0;
    document.querySelectorAll(".opt").forEach(b=>{ if(b.querySelector("span:last-child").textContent===q.opts.find(x=>x.c).t) b.classList.add("correct"); });
    fb.className="fb ng show"; fb.innerHTML="<b>答錯了，攻擊落空</b>"+q.exp+"<div class='res'>這格還沒翻開，換一格或再試一次！</div>";
    document.getElementById("mnextBtn").textContent="繼續 →";
    document.getElementById("mnextBtn").onclick=()=>{ closeModal(); };
  }
  document.getElementById("mnext").className="mnext show";
  renderHUD();
}
function closeModal(){ document.getElementById("modal").classList.remove("show"); busy=false; }

function doReveal(i){
  revealed[i]=true; opened++;
  const t=board[i]; let gain=50;
  if(t==="ship"){ gain=500; score+=gain+combo*20; renderBoard(); renderHUD(); confettiBig(); return win(); }
  if(t==="bomb"){ hp-=2; shake(); flashRed(); gain=10; }
  else if(t==="star"){ hp+=2; confetti("⭐"); gain=80; }
  else { gain=40; }
  score+=gain+combo*10;
  renderBoard(); renderHUD();
  if(hp<=0) return lose();
}

/* ===== 勝負 ===== */
function win(){
  over=true;
  document.getElementById("endIcon").textContent="🏆";
  document.getElementById("endTitle").textContent="擊沉敵艦！獲勝！";
  document.getElementById("endMsg").innerHTML="你找到並擊沉了敵艦 🚢！<br>數學讓你百發百中！";
  finishStats(); setTimeout(()=>show("s-end"),900);
}
function lose(){
  over=true;
  document.getElementById("endIcon").textContent="💥";
  document.getElementById("endTitle").textContent="艦艇沉沒…";
  document.getElementById("endMsg").innerHTML="生命值歸零了！<br>再熟練對角線性質，下次一定找到敵艦！";
  finishStats(); setTimeout(()=>show("s-end"),900);
}
function finishStats(){
  document.getElementById("eScore").textContent=score;
  document.getElementById("eOpen").textContent=opened;
  document.getElementById("eMax").textContent=maxCombo;
}

/* ===== 工具 ===== */
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); window.scrollTo(0,0); }
function shake(){ document.querySelector(".app").classList.add("shake"); setTimeout(()=>document.querySelector(".app").classList.remove("shake"),420); }
function flashRed(){ const f=document.getElementById("flash"); f.classList.remove("go"); void f.offsetWidth; f.classList.add("go"); }
function confetti(e){ for(let i=0;i<12;i++) drop(e||rnd(["⭐","✨","💛"])); }
function confettiBig(){ for(let i=0;i<40;i++) setTimeout(()=>drop(rnd(["🎉","⭐","🏆","✨","💥"])),i*45); }
function drop(e){ const d=document.createElement("div"); d.className="fx"; d.textContent=e;
  d.style.left=Math.random()*100+"vw"; d.style.fontSize=(20+Math.random()*20)+"px";
  d.style.animation="fall "+(1.5+Math.random()*1.5)+"s linear forwards";
  document.body.appendChild(d); setTimeout(()=>d.remove(),3200); }
</script>
